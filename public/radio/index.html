    <script type="module">
const QUERY_PARAMS = new URLSearchParams(window.location.search);

function getStringQueryParam(name, fallback) {
  const rawValue = QUERY_PARAMS.get(name);
  const value = typeof rawValue === "string" ? rawValue.trim() : "";
  return value.length > 0 ? value : fallback;
}

function getNumberQueryParam(name, fallback, { min = -Infinity, max = Infinity } = {}) {
  const rawValue = QUERY_PARAMS.get(name);
  if (rawValue === null || rawValue.trim().length === 0) {
    return fallback;
  }

  const value = Number(rawValue);
  if (!Number.isFinite(value)) {
    return fallback;
  }

  return Math.min(max, Math.max(min, value));
}

function getBooleanQueryParam(name, fallback) {
  const rawValue = QUERY_PARAMS.get(name);
  if (rawValue === null || rawValue.trim().length === 0) {
    return fallback;
  }

  const value = rawValue.trim().toLowerCase();
  if (["1", "true", "yes", "on"].includes(value)) {
    return true;
  }

  if (["0", "false", "no", "off"].includes(value)) {
    return false;
  }

  return fallback;
}

function extractAudioPostData(payload) {

function maybeParseJsonString(value) {
  if (typeof value !== "string") {
    return value;
  }

  try {
    return JSON.parse(value);
  } catch {
    return value;
  }
}

function extractContentValue(payload) {
  if (typeof payload === "string") {
    const parsed = maybeParseJsonString(payload);
    if (parsed !== payload) {
      return extractContentValue(parsed);
    }

    return payload.trim();
  }

  if (Array.isArray(payload)) {
    for (const item of payload) {
      const content = extractContentValue(item);
      if (typeof content === "string" && content.trim().length > 0) {
        return content.trim();
      }
    }

    return null;
  }

  if (!payload || typeof payload !== "object") {
    return null;
  }

  if (typeof payload.content === "string") {
    const parsed = maybeParseJsonString(payload.content);
    if (parsed !== payload.content) {
      const nestedContent = extractContentValue(parsed);
      if (typeof nestedContent === "string" && nestedContent.trim().length > 0) {
        return nestedContent.trim();
      }
    }

    return payload.content.trim();
  }

  for (const key of ["response", "data", "output", "message", "result"]) {
    if (key in payload) {
      const content = extractContentValue(payload[key]);
      if (typeof content === "string" && content.trim().length > 0) {
        return content.trim();
      }
    }
  }

  return null;
}

async function readBlobWithProgress(response, onProgress) {
  if (!response.body) {
    if (onProgress) {
      onProgress(1);
    }

    return await response.blob();
  }

  const reader = response.body.getReader();
  const contentType = response.headers.get("Content-Type") || "audio/wav";
  const contentLength = Number(response.headers.get("Content-Length"));
  const chunks = [];
  let receivedLength = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) {
      break;
    }

    chunks.push(value);
    receivedLength += value.length;

    if (onProgress && Number.isFinite(contentLength) && contentLength > 0) {
      onProgress(receivedLength / contentLength);
    }
  }

  if (onProgress) {
    onProgress(1);
  }

  return new Blob(chunks, { type: contentType });
}

function buildLogBarDescriptors(audioContext, analyser, frequencyBinCount, barCount) {
  if (!audioContext || !analyser || frequencyBinCount <= 0 || barCount <= 0) {
    return [];
  }

  const nyquist = audioContext.sampleRate / 2;
  const maxBin = frequencyBinCount - 1;
  const minDisplayFrequency = Math.max(0, Math.min(MIN_DISPLAY_FREQUENCY, nyquist));
  const maxDisplayFrequency = Math.min(MAX_DISPLAY_FREQUENCY, nyquist);
  const safeMaxDisplayFrequency = Math.max(minDisplayFrequency, maxDisplayFrequency);
  const minFrequency = Math.max(audioContext.sampleRate / analyser.fftSize, MIN_LOG_FREQUENCY, minDisplayFrequency);
  const minLog = Math.log10(minFrequency);
  const maxLog = Math.log10(Math.max(minFrequency, safeMaxDisplayFrequency));
  const minDisplayBin = Math.max(0, Math.min(maxBin, Math.floor((minDisplayFrequency / nyquist) * frequencyBinCount)));
  const maxDisplayBin = Math.max(
    minDisplayBin,
    Math.min(maxBin, Math.ceil((safeMaxDisplayFrequency / nyquist) * frequencyBinCount) - 1),
  );
  const binEdges = new Array(barCount + 1);

  binEdges[0] = minDisplayBin;
  binEdges[barCount] = maxDisplayBin + 1;

  for (let index = 1; index < barCount; index += 1) {
    const ratio = index / barCount;
    const frequency = 10 ** (minLog + (maxLog - minLog) * ratio);
    const proposedEdge = Math.floor((frequency / nyquist) * frequencyBinCount);
    const minAllowedEdge = binEdges[index - 1] + 1;
    const remainingEdges = barCount - index;
    const maxAllowedEdge = (maxDisplayBin + 1) - remainingEdges;

    binEdges[index] = Math.max(minAllowedEdge, Math.min(maxAllowedEdge, proposedEdge));
  }

  return Array.from({ length: barCount }, (_, index) => ({
    startBin: binEdges[index],
    endBin: Math.max(binEdges[index], binEdges[index + 1] - 1),
  }));
}

  if (!hasBoundingBox) {
    return {

      actualBoundingBoxLeft: 0,

  }

  const boundingWidth = Math.max(0, metrics.actualBoundingBoxLeft + metrics.actualBoundingBoxRight);

  return {

  if (isShowing) {
    state.phase = "hiding";
    state.count = wasVisible ? state.text.length : state.count;
    state.keepScrollOffset = state.isScrolling;
  } else if (typeof nextText === "string") {
    startFlapTextReveal(state, nextText);
  } else {
    state.phase = "hidden";
    state.current = "";
    state.count = 0;
    state.pendingRevealText = null;
  }
}

function drawBottomLeftScrollingTextMask(ctx, canvas, deltaTime, textState, controlsHeight = CONTROL_BUTTON_SIZE) {
  if (!textState) {
    return;
  }

  updateFlapTextState(textState, deltaTime);

  if (!textState.current.length) {
    return;
  }

  const ratio = window.devicePixelRatio || 1;
  const fontSize = BACKGROUND_TEXT_FONT_SIZE * ratio;
  const padding = BACKGROUND_TEXT_PADDING * ratio;
  const bottom = BACKGROUND_TEXT_BOTTOM * ratio;
  const buttonGap = BACKGROUND_TEXT_BUTTON_GAP * ratio;
  const gap = BACKGROUND_TEXT_GAP * ratio;
  const controlsHeightPx = controlsHeight * ratio;
  const availableWidth = Math.max(0, canvas.width - padding * 2);
  const clipWidth = Math.max(0, canvas.width - padding * 2);
  const clipHeight = Math.max(0, canvas.height - padding * 2);

  ctx.save();
  ctx.font = `normal ${BACKGROUND_TEXT_FONT_WEIGHT} ${fontSize}px ${BACKGROUND_TEXT_FONT_FAMILY}`;
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "#ffffff";

  if (clipWidth > 0 && clipHeight > 0) {
    ctx.beginPath();
    ctx.rect(padding, padding, clipWidth, clipHeight);
    ctx.clip();
  }

  if (
    textState.measuredTextFont !== ctx.font
    || textState.measuredText !== textState.text
    || textState.measuredTextRevision !== textMeasurementRevision
  ) {
    textState.measuredTextFont = ctx.font;
    textState.measuredText = textState.text;
    textState.measuredTextRevision = textMeasurementRevision;

    textState.measuredTextWidth = measureCanvasText(ctx, textState.text).width;
  }

  if (
    textState.measuredCurrentFont !== ctx.font
    || textState.measuredCurrent !== textState.current
    || textState.measuredCurrentRevision !== textMeasurementRevision
  ) {
    textState.measuredCurrentFont = ctx.font;
    textState.measuredCurrent = textState.current;
    textState.measuredCurrentRevision = textMeasurementRevision;

    const textMetrics = measureCanvasText(ctx, textState.current);

    textState.measuredCurrentWidth = textMetrics.width;
    textState.actualBoundingBoxLeft = textMetrics.actualBoundingBoxLeft;
  }

  const fullTextWidth = textState.measuredTextWidth || 0;
  const textWidth = textState.measuredCurrentWidth || 0;
  const y = canvas.height - bottom;
  const displayWidth = Math.min(Math.max(textWidth, fullTextWidth), availableWidth > 0 ? availableWidth : fullTextWidth);
  const shouldScroll = fullTextWidth > availableWidth
    && (textState.phase === "visible" || textState.phase === "hiding");

  textState.layout.x = padding / ratio;
  textState.layout.y = (canvas.height - bottom - fontSize) / ratio;
  textState.layout.width = displayWidth / ratio;
  textState.layout.height = (fontSize + padding) / ratio;
  textState.isScrolling = shouldScroll;

  if (shouldScroll) {
    textState.scrollX = (textState.scrollX + BACKGROUND_TEXT_SCROLL_SPEED * ratio * deltaTime) % (fullTextWidth + gap);
    ctx.fillText(textState.current, padding + textState.actualBoundingBoxLeft - textState.scrollX, y);
    ctx.fillText(textState.current, padding + textState.actualBoundingBoxLeft - textState.scrollX + fullTextWidth + gap, y);
  } else {
    textState.scrollX = 0;
    ctx.fillText(textState.current, padding + textState.actualBoundingBoxLeft, y);
  }

  ctx.restore();
}

async function blobToDataUrl(blob) {
  return await new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => {
      resolve(reader.result);
    };
    reader.onerror = () => {
      reject(reader.error);
    };
    reader.readAsDataURL(blob);
  });
}

async function loadProgressStripe() {
  const scale = clamp(Math.trunc(window.devicePixelRatio || 1), 1, 3);
  const stripePath = scale > 1 ? `/images/Stripes@${scale}x.png` : "/images/Stripes.png";

  try {
    const response = await fetch(stripePath);
    if (!response.ok) {
      return null;
    }

    return await blobToDataUrl(await response.blob());
  } catch (error) {
    console.error(error);
    return null;
  }
}

function createProgressBar(stripeDataUrl) {
  const progress = document.createElement("div");
  const bar = document.createElement("div");
  let pendingRate = 0;
  let updateFrameId = null;

  progress.className = "progress visible";
  bar.className = "bar animating";
  bar.style.width = "0%";

  if (stripeDataUrl) {
    bar.style.backgroundImage = `url('${stripeDataUrl}')`;
  }

  progress.appendChild(bar);
  document.body.prepend(progress);

  function flushUpdate() {
    updateFrameId = null;
    bar.style.width = `${Math.floor(pendingRate * 100)}%`;
  }

  function cancelPendingUpdate() {
    if (updateFrameId === null) {
      return;
    }

    window.cancelAnimationFrame(updateFrameId);
    updateFrameId = null;
  }

  return {
    progress,
    bar,
    update(rate) {
      pendingRate = clamp(rate, 0, 1);
      if (updateFrameId === null) {
        updateFrameId = window.requestAnimationFrame(flushUpdate);
      }
    },
    finish() {
      cancelPendingUpdate();
      bar.style.width = "100%";
      bar.animate([{ opacity: 0 }], {
        delay: 0,
        fill: "forwards",
        duration: 500,
        iterations: 1,
        easing: "ease-in",
      }).onfinish = () => {
        progress.remove();
      };
    },
    fail() {
      cancelPendingUpdate();
      bar.animate([{ opacity: 0 }], {
        delay: 0,
        fill: "forwards",
        duration: 500,
        iterations: 1,
        easing: "ease-in",
      }).onfinish = () => {
        progress.remove();
      };
    },
  };
}

async function wait(milliseconds) {
  await new Promise(resolve => {
    window.setTimeout(resolve, milliseconds);
  });
}

async function animateScalar(from, to, duration, onUpdate) {
  if (duration <= 0) {
    onUpdate(to);
    return;
  }

  await new Promise(resolve => {
    const startedAt = performance.now();

    function step(now) {
      const progress = clamp((now - startedAt) / duration, 0, 1);
      onUpdate(lerp(from, to, sineEaseInOut(progress)));

      if (progress >= 1) {
        resolve();
        return;
      }

      window.requestAnimationFrame(step);
    }

    window.requestAnimationFrame(step);
  });
}

function drawImageCover(ctx, image, width, height) {
  if (!image || !image.complete || image.naturalWidth <= 0 || image.naturalHeight <= 0) {
    return;
  }

  const canvasAspect = width / height;
  const imageAspect = image.naturalWidth / image.naturalHeight;
  let drawWidth = width;
  let drawHeight = height;
  let offsetX = 0;
  let offsetY = 0;

  if (imageAspect > canvasAspect) {
    drawHeight = height;
    drawWidth = drawHeight * imageAspect;
    offsetX = (width - drawWidth) * 0.5;
  } else {
    drawWidth = width;
    drawHeight = drawWidth / imageAspect;
    offsetY = 0;
  }

  ctx.drawImage(image, offsetX, offsetY, drawWidth, drawHeight);
}

function drawBackgroundImageBuffer(buffer, image, width, height) {
  buffer.ctx.clearRect(0, 0, width, height);

  if (!image || !image.complete || image.naturalWidth <= 0 || image.naturalHeight <= 0) {
    return;
  }

  drawImageCover(buffer.ctx, image, width, height);
}

function appendTermsToBackgroundTextPools(terms) {
  if (!Array.isArray(terms)) {
    return;
  }

  for (const term of terms) {
    if (typeof term === "string") {
      addUniqueTextValue(backgroundTextBaseWords, term);
      continue;
    }

    if (!Array.isArray(term) || term.length === 0) {
      continue;
    }

    for (let index = 0; index < term.length; index += 1) {
      if (index === term.length - 1) {
        addUniqueTextValue(backgroundTextBaseWords, term[index]);
      } else {
        addUniqueTextValue(backgroundTextModifiers, term[index]);
      }
    }
  }
}

function hydrateBackgroundTextPoolsFromPayload(payload) {
  backgroundTextModifiers.length = 0;
  backgroundTextBaseWords.length = 0;
  backgroundTextModifiers.push(...DEFAULT_BACKGROUND_TEXT_MODIFIERS);
  backgroundTextBaseWords.push(...DEFAULT_BACKGROUND_TEXT_BASE_WORDS);

  if (!Array.isArray(payload)) {
    return;
  }

  const threshold = Number(THRESHOLD);

  for (const item of payload) {
    if (!item || typeof item !== "object") {
      continue;
    }

    const score = Number(item.score);
    if (!Number.isFinite(score) || score < threshold || !("terms" in item)) {
      continue;
    }

    appendTermsToBackgroundTextPools(item.terms);
  }
}

async function hydrateBackgroundTextPools() {
  try {
    const payload = await fetchSharedApiFetchPayload();
    hydrateBackgroundTextPoolsFromPayload(payload);
  } catch (error) {
    console.error(error);
  }
}

function drawBackground(ctx, width, height) {
  ctx.clearRect(0, 0, width, height);
}

function createLoadingMeteorState() {
  return {
    time: 0,
    meteors: [],
    sparkles: [],
    rhythmIndex: 0,
    isSpawning: false,
  };
}

function nextLoadingMeteorDelay(state, urgent = false) {
  if (urgent) {
    return randomRange(0.02, 0.12);
  }

  const delay = LOADING_METEOR_RHYTHM_DELAYS[state.rhythmIndex % LOADING_METEOR_RHYTHM_DELAYS.length];
  state.rhythmIndex += 1;

  return delay + randomRange(-0.06, 0.1);
}

function createLoadingMeteor(state, width, height, delay = randomRange(0.2, 4.5)) {
  const ratio = window.devicePixelRatio || 1;
  const baseSize = randomRange(3.2, 5.4);
  const size = baseSize * ratio;
  const sizeRatio = (baseSize - 3.2) / (5.4 - 3.2);
  const speed = randomRange(230, 390) * ratio;
  const angle = randomRange(Math.PI * 0.7, Math.PI * 0.76);

  return {
    x: randomRange(width * 0.74, width + 180 * ratio),
    y: randomRange(-90 * ratio, height * 0.18),
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    size,
    tail: randomRange(82, 150) * ratio,
    delay,
    age: 0,
    life: randomRange(2.4, 4.2),
    curve: randomRange(-24, 24) * ratio,
    rotationSpeed: randomRange(4.9, 5.7) - sizeRatio * randomRange(2.1, 2.8),
    wobble: randomRange(0.35, 0.75),
    phase: randomRange(0, Math.PI * 2),
  };
}

function startLoadingMeteorShower(state, width, height) {
  if (REDUCE_MOTION_MEDIA.matches) {
    return;
  }

  state.isSpawning = true;

  while (state.meteors.length < LOADING_METEOR_POOL_SIZE) {
    const delay = state.meteors.length === 0 ? 0 : nextLoadingMeteorDelay(state);
    state.meteors.push(createLoadingMeteor(state, width, height, delay));
  }
}

function stopLoadingMeteorShower(state) {
  state.isSpawning = false;

  for (let index = state.meteors.length - 1; index >= 0; index -= 1) {
    if (state.meteors[index].delay > 0) {
      state.meteors.splice(index, 1);
    }
  }
}

function hasActiveLoadingMeteors(state) {
  return state.isSpawning || state.meteors.length > 0 || state.sparkles.length > 0;
}

function spawnLoadingMeteorSparkles(state, x, y, size) {
  const amount = Math.ceil(size * 0.35);

  for (let index = 0; index < amount; index += 1) {
    state.sparkles.push({
      x: x + randomRange(-8, 8),
      y: y + randomRange(-8, 8),
      vx: randomRange(-36, 18),
      vy: randomRange(-26, 22),
      size: randomRange(0.8, 1.8) * (window.devicePixelRatio || 1),
      age: 0,
      life: randomRange(0.38, 0.9),
    });
  }
}

function drawLoadingMeteorTailMask(ctx, meteor, headX, headY, tailX, tailY, fade, normalX, normalY) {
  const controlX = (headX + tailX) * 0.5 + normalX * meteor.curve * 0.35;
  const controlY = (headY + tailY) * 0.5 + normalY * meteor.curve * 0.35;
  const core = ctx.createLinearGradient(headX, headY, tailX, tailY);
  core.addColorStop(0, `rgba(255, 255, 255, ${0.78 * fade})`);
  core.addColorStop(0.18, `rgba(255, 255, 255, ${0.4 * fade})`);
  core.addColorStop(0.7, `rgba(255, 255, 255, ${0.12 * fade})`);
  core.addColorStop(1, "rgba(255, 255, 255, 0)");

  ctx.strokeStyle = core;
  ctx.lineWidth = meteor.size * 0.9;
  ctx.beginPath();
  ctx.moveTo(headX, headY);
  ctx.quadraticCurveTo(controlX, controlY, tailX, tailY);
  ctx.stroke();

  const glow = ctx.createLinearGradient(headX, headY, tailX, tailY);
  glow.addColorStop(0, `rgba(255, 255, 255, ${0.16 * fade})`);
  glow.addColorStop(0.46, `rgba(255, 255, 255, ${0.07 * fade})`);
  glow.addColorStop(1, "rgba(255, 255, 255, 0)");

  ctx.strokeStyle = glow;
  ctx.lineWidth = meteor.size * 3.5;
  ctx.beginPath();
  ctx.moveTo(headX, headY);
  ctx.quadraticCurveTo(controlX, controlY, tailX, tailY);
  ctx.stroke();
}

function drawLoadingMeteorStarMask(ctx, size, alpha) {
  const starAlpha = clamp(0.38 + alpha * 0.62, 0, 1);

  ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha})`;
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.72 * starAlpha})`;
  ctx.lineWidth = clamp(size * 0.08, 0.8, 1.4);
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.bezierCurveTo(size * 0.13, -size * 0.36, size * 0.36, -size * 0.13, size, 0);
  ctx.bezierCurveTo(size * 0.36, size * 0.13, size * 0.13, size * 0.36, 0, size);
  ctx.bezierCurveTo(-size * 0.13, size * 0.36, -size * 0.36, size * 0.13, -size, 0);
  ctx.bezierCurveTo(-size * 0.36, -size * 0.13, -size * 0.13, -size * 0.36, 0, -size);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function drawLoadingMeteorHeadMask(ctx, meteor, x, y, fade, time) {
  const pulse = 1 + Math.sin(time * 9 + meteor.phase) * 0.08;
  const radius = meteor.size * pulse;
  const halo = ctx.createRadialGradient(x, y, 0, x, y, radius * 4.8);
  halo.addColorStop(0, `rgba(255, 255, 255, ${0.46 * fade})`);
  halo.addColorStop(0.32, `rgba(255, 255, 255, ${0.16 * fade})`);
  halo.addColorStop(1, "rgba(255, 255, 255, 0)");

  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(x, y, radius * 4.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(time * meteor.rotationSpeed + meteor.phase);
  drawLoadingMeteorStarMask(ctx, radius * 3.15, fade);
  ctx.restore();
}

function drawLoadingMeteorsMask(ctx, width, height, state, deltaTime) {
  if (!state || REDUCE_MOTION_MEDIA.matches) {
    return;
  }

  const safeDeltaTime = Math.min(Math.max(deltaTime, 0), 0.04);
  state.time += safeDeltaTime;

  ctx.save();
  ctx.lineCap = "round";

  let activeCount = 0;

  for (let index = state.meteors.length - 1; index >= 0; index -= 1) {
    const meteor = state.meteors[index];
    meteor.delay -= safeDeltaTime;

    if (meteor.delay > 0) {
      continue;
    }

    activeCount += 1;
    meteor.age += safeDeltaTime;
    meteor.x += meteor.vx * safeDeltaTime;
    meteor.y += meteor.vy * safeDeltaTime;

    const progress = clamp(meteor.age / meteor.life, 0, 1);
    const fade = Math.sin(progress * Math.PI);
    const angle = Math.atan2(meteor.vy, meteor.vx);
    const normalX = -Math.sin(angle);
    const normalY = Math.cos(angle);
    const curveOffset = Math.sin(progress * Math.PI) * meteor.curve;
    const wobble = Math.sin(state.time * 2.2 * meteor.wobble + meteor.phase) * 1.8;
    const headX = meteor.x + normalX * curveOffset + wobble;
    const headY = meteor.y + normalY * curveOffset;
    const tailX = headX - Math.cos(angle) * meteor.tail;
    const tailY = headY - Math.sin(angle) * meteor.tail;

    drawLoadingMeteorTailMask(ctx, meteor, headX, headY, tailX, tailY, fade, normalX, normalY);
    drawLoadingMeteorHeadMask(ctx, meteor, headX, headY, fade, state.time);

    if (Math.random() > 0.72) {
      spawnLoadingMeteorSparkles(state, headX, headY, meteor.size);
    }

    if (meteor.age > meteor.life || headX < -meteor.tail - 80 || headY > height + meteor.tail + 80) {
      activeCount -= 1;

      if (state.isSpawning) {
        Object.assign(meteor, createLoadingMeteor(state, width, height, nextLoadingMeteorDelay(state, activeCount <= 0)));
      } else {
        state.meteors.splice(index, 1);
      }
    }
  }

  if (state.isSpawning && activeCount === 0) {
    const soonestMeteor = state.meteors.reduce((soonest, meteor) => {
      if (!soonest || meteor.delay < soonest.delay) {
        return meteor;
      }

      return soonest;
    }, null);

    if (soonestMeteor) {
      soonestMeteor.delay = 0;
    }
  }

  for (let index = state.sparkles.length - 1; index >= 0; index -= 1) {
    const sparkle = state.sparkles[index];
    sparkle.age += safeDeltaTime;
    sparkle.x += sparkle.vx * safeDeltaTime;
    sparkle.y += sparkle.vy * safeDeltaTime;
    sparkle.vy += 12 * safeDeltaTime;

    const alpha = 1 - sparkle.age / sparkle.life;
    if (alpha <= 0) {
      state.sparkles.splice(index, 1);
      continue;
    }

    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(sparkle.x, sparkle.y, sparkle.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawVisualizer(maskCtx, width, height, energy, smoothedLevels, visualizerScales, shouldAnimate, textState, deltaTime, backgroundImageCanvas, backgroundImageOpacity, controlsHeight = 0, meteorState = null) {
  const barCount = smoothedLevels.length || VISUALIZER_BAR_COUNT;
  const visualizerWidth = clamp(width * VISUALIZER_WIDTH_RATIO, 24, width);
  const visualizerHeight = clamp(height * VISUALIZER_HEIGHT_RATIO, 24, height);
  const centerX = width * 0.5;
  const centerY = height * 0.5;
  const spaceUnits = VISUALIZER_BAR_SPACE_RATIO >= 1
    ? 1
    : VISUALIZER_BAR_SPACE_RATIO <= 0
      ? 0
      : VISUALIZER_BAR_SPACE_RATIO / (1 - VISUALIZER_BAR_SPACE_RATIO);
  const widthUnits = barCount + Math.max(0, barCount - 1) * spaceUnits;
  const barWidth = clamp(widthUnits > 0 ? visualizerWidth / widthUnits : visualizerWidth, 2, Math.max(2, visualizerWidth));
  const barGap = barWidth * spaceUnits;
  const totalGapWidth = Math.max(0, (barCount - 1) * barGap);
  const actualWidth = barWidth * barCount + totalGapWidth;
  const startX = centerX - actualWidth * 0.5;
  const stride = barWidth + barGap;
  const maxHeight = visualizerHeight * 0.82;
  const isActive = Boolean(shouldAnimate);

  maskCtx.save();
  maskCtx.clearRect(0, 0, width, height);
  maskCtx.fillStyle = "#ffffff";
  maskCtx.shadowBlur = 0;

  for (let index = 0; index < barCount; index += 1) {
    const x = startX + stride * index;
    const centerBoost = centerWeightedValue(index, barCount);
    const normalized = isActive
      ? clamp((smoothedLevels[index] || 0) * 0.9 + centerBoost * 0.02 + energy * 0.01, 0.03, VISUALIZER_LEVEL_HEADROOM)
      : 0;
    const baseHeight = Math.max(barWidth, normalized * maxHeight);
    const scale = clamp(visualizerScales[index] || 1, LOADING_MIN_SCALE, LOADING_MAX_SCALE);
    const drawWidth = barWidth * scale;
    const isScaledDown = scale < LOADING_MAX_SCALE - 0.001;
    const barHeight = isScaledDown ? drawWidth : baseHeight;
    const radius = Math.min(drawWidth * 0.5, barHeight * 0.5);
    const drawX = x + (barWidth - drawWidth) * 0.5;
    const drawY = centerY - barHeight * 0.5;

    maskCtx.beginPath();
    maskCtx.roundRect(drawX, drawY, drawWidth, barHeight, radius);
    maskCtx.fill();
  }

  drawBottomLeftScrollingTextMask(maskCtx, maskCtx.canvas, deltaTime, textState, controlsHeight);
  drawLoadingMeteorsMask(maskCtx, width, height, meteorState, deltaTime);

  maskCtx.globalCompositeOperation = "source-atop";
  maskCtx.fillStyle = VISUALIZER_FILL_STYLE;
  maskCtx.fillRect(0, 0, width, height);

  if (backgroundImageCanvas && backgroundImageOpacity > 0.001) {
    maskCtx.globalAlpha = backgroundImageOpacity * BACKGROUND_IMAGE_OPACITY;
    maskCtx.drawImage(backgroundImageCanvas, 0, 0, width, height);
    maskCtx.globalAlpha = 1;
  }
  maskCtx.globalCompositeOperation = "source-over";
  maskCtx.restore();
}

function sineEaseInOut(value) {
  const clamped = clamp(value, 0, 1);
  return 0.5 - 0.5 * Math.cos(Math.PI * clamped);
}

function loadingScaleForPhase(phaseTime) {
  if (phaseTime <= 0) {
    return LOADING_MAX_SCALE;
  }

  if (phaseTime < LOADING_ALPHA_FADE_OUT_DURATION_MS) {
    const progress = sineEaseInOut(phaseTime / LOADING_ALPHA_FADE_OUT_DURATION_MS);
    return LOADING_MAX_SCALE + (LOADING_MIN_SCALE - LOADING_MAX_SCALE) * progress;
  }

  if (phaseTime < LOADING_PULSE_DURATION_MS) {
    const progress = sineEaseInOut((phaseTime - LOADING_ALPHA_FADE_OUT_DURATION_MS) / LOADING_ALPHA_FADE_IN_DURATION_MS);
    return LOADING_MIN_SCALE + (LOADING_MAX_SCALE - LOADING_MIN_SCALE) * progress;
  }

  return LOADING_MAX_SCALE;
}

function writeLoadingScales(target, timestamp, startedAt) {
  const elapsed = Math.max(0, timestamp - startedAt);
  const cycleTime = elapsed % LOADING_CYCLE_DURATION_MS;

  target.fill(LOADING_MAX_SCALE);

  for (let step = 0; step < LOADING_ACTIVE_ORDER.length; step += 1) {
    const index = LOADING_ACTIVE_ORDER[step];
    const phaseTime = cycleTime - step * LOADING_ALPHA_STEP_MS;
    target[index] = Math.min(target[index], loadingScaleForPhase(phaseTime));
  }
}

function writeReleaseScales(target, timestamp, startedAt, fromScales) {
  const progress = sineEaseInOut((timestamp - startedAt) / LOADING_EXPAND_DURATION_MS);
  for (let index = 0; index < target.length; index += 1) {
    const scale = fromScales[index] ?? 1;
    target[index] = scale + (1 - scale) * progress;
  }
}

function copyArrayValues(source, target) {
  for (let index = 0; index < target.length; index += 1) {
    target[index] = source[index] ?? target[index];
  }
}

function shake(element) {
  if (!element?.animate) {
    return;
  }

  element.animate([
    { transform: "translate3d(5px, 0, 0)" },
    { transform: "translate3d(0, 0, 0)" },
    { transform: "translate3d(-5px, 0, 0)" },
    { transform: "translate3d(4px, 0, 0)" },
    { transform: "translate3d(0, 0, 0)" },
    { transform: "translate3d(-4px, 0, 0)" },
    { transform: "translate3d(3px, 0, 0)" },
    { transform: "translate3d(0, 0, 0)" },
    { transform: "translate3d(-3px, 0, 0)" },
    { transform: "translate3d(2px, 0, 0)" },
    { transform: "translate3d(0, 0, 0)" },
    { transform: "translate3d(-2px, 0, 0)" },

  async function waitForCurrentAudioReady(expectedSrc) {
    if (audio.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA) {
      return;
    }

    await new Promise(resolve => {
      let isSettled = false;
      let timeoutId = null;

      function cleanup() {
        audio.removeEventListener("loadeddata", finish);
        audio.removeEventListener("canplay", finish);
        audio.removeEventListener("error", finish);
        if (timeoutId !== null) {
          window.clearTimeout(timeoutId);
        }
      }

      function finish() {
        if (isSettled) {
          return;
        }

        isSettled = true;
        cleanup();
        resolve();
      }

      if (getCurrentAudioSource() !== expectedSrc) {
        finish();
        return;
      }

      timeoutId = window.setTimeout(finish, 200);
      audio.addEventListener("loadeddata", finish);
      audio.addEventListener("canplay", finish);
      audio.addEventListener("error", finish);
    });

        throw error;
      }

      if (!expectedSrc || getCurrentAudioSource() !== expectedSrc) {
        return false;
      }

      await waitForCurrentAudioReady(expectedSrc);
      if (getCurrentAudioSource() !== expectedSrc) {
        return false;
      }

      try {
        await audio.play();
        return true;
      } catch (retryError) {
        if (isAbortError(retryError)) {
          return false;

        throw retryError;
      }

    frequencyData = new Float32Array(analyser.frequencyBinCount);

      }

      const post = await fetchRandomAudioPost();
      const selection = createApiTextSelection(post.input, post.id, post.conversationMessages ?? []);
      if (selection.text) {
        applyTextSelection(selection);
      } else {
        clearDisplayedTextSelection(selection);
      }
    } catch (error) {
      console.error(error);
      const selection = fallbackSelection.source === "api" && fallbackSelection.audioId
        ? fallbackSelection
        : createRandomTextSelection();
      if (selection.text) {
        applyTextSelection(selection);
      } else {
        clearDisplayedTextSelection(selection);
      }
    } finally {
      isChoosingNextText = false;
      updateTextRandomizerButtonState();
    }
  }

  async function fadeOutBackgroundImage() {
    if (backgroundImageOpacity <= 0.001) {
      backgroundImageOpacity = 0;
      return;
    }

    await animateScalar(backgroundImageOpacity, 0, BACKGROUND_IMAGE_FADE_DURATION_MS, value => {
      backgroundImageOpacity = value;
    });
  }

  async function loadAndFadeInBackgroundImage() {
    if (BACKGROUND_IMAGE_URLS.length === 0) {
      backgroundImageOpacity = 0;
      return;
    }

    const token = ++backgroundImageToken;
    const nextBackgroundImageUrl = pickRandom(BACKGROUND_IMAGE_URLS);

    await new Promise((resolve, reject) => {
      backgroundImage.onload = () => resolve();
      backgroundImage.onerror = error => reject(error);
      backgroundImage.src = nextBackgroundImageUrl;
    }).catch(error => {
      console.error(error);
    });

    if (token !== backgroundImageToken) {
      return;
    }

    await animateScalar(0, 1, BACKGROUND_IMAGE_FADE_DURATION_MS, value => {
      backgroundImageOpacity = value;
    });
  }

  async function playGeneratedAudioAt(index) {
    if (index < 0 || index >= generatedAudioBlobs.length) {
      return false;
    }

    currentAudioBlobIndex = index;
    playbackState.ignorePauseEvent = true;
    if (!isPrimingAudioPlayback) {
      audio.pause();
    }
    restoreAudioPlaybackPrimeState();
    audio.currentTime = 0;

    if (audioObjectUrl) {
      URL.revokeObjectURL(audioObjectUrl);
      audioObjectUrl = null;
    }

    audioObjectUrl = URL.createObjectURL(generatedAudioBlobs[index]);
    audio.src = audioObjectUrl;
    audio.load();

    try {
      if (audioContext?.state === "suspended") {
        await audioContext.resume();
      }

      const didPlay = await playCurrentAudioWithAbortRetry();
      if (!didPlay) {
        setPlaybackState(false);
        return false;
      }

      setPlaybackState(true);
      return true;
    } finally {
      playbackState.ignorePauseEvent = false;
    }
  }

  async function loadNextAudio({ autoplay = false } = {}) {
    if (audioLoadPromise) {
      await audioLoadPromise;
      return;
    }

    loadingStartedAt = performance.now();
    playbackState.isLoadingAudio = true;
    updateTextRandomizerButton();

    audioLoadPromise = (async () => {
      let didLoadSucceed = false;
      await fadeOutBackgroundImage();

      const stripeDataUrl = await (progressStripePromise ??= loadProgressStripe());
      const progress = createProgressBar(stripeDataUrl);

      try {
        await prepareBackgroundText();
        const selection = currentTextSelection ?? createRandomTextSelection();
        const topic = selection.source === "api"
          ? (selection.text || "")
          : (selection.text || backgroundTextState.text || createBackgroundText());
        const hasTextSelection = typeof selection.text === "string" && selection.text.length > 0;
        const selectionConversationMessages = Array.isArray(selection.conversationMessages)
          ? selection.conversationMessages
          : [];
        const isMatchingApiSelection = selection.source === "api"
          && hasTextSelection
          && topic === lastGeneratedTopic
          && selection.audioId === lastGeneratedAudioId;
        const isMatchingRandomSelection = selection.source !== "api"
          && hasTextSelection
          && topic === lastGeneratedTopic;
        const shouldContinueConversation = isMatchingApiSelection || isMatchingRandomSelection;
        const conversationHistory = shouldContinueConversation
          ? (lastGeneratedConversationMessages.length > 0
              ? lastGeneratedConversationMessages
              : selectionConversationMessages)
          : selectionConversationMessages;
        const backgroundImagePromise = loadAndFadeInBackgroundImage();
        const selectionAudioId = selection.source === "api" ? selection.audioId : null;
        const shouldUseSelectionAudio = Boolean(selectionAudioId)
          && (!hasTextSelection || !shouldContinueConversation);
        let queriedAudioPost = null;
        if (!shouldUseSelectionAudio && !shouldContinueConversation) {
          try {
            queriedAudioPost = await fetchLatestAudioPostByQuery(topic);
          } catch (error) {
            console.warn(error);
          }
        }
        const externalAudioId = shouldUseSelectionAudio
          ? selectionAudioId
          : (queriedAudioPost?.id ?? null);
        const shouldDownloadExternalAudio = Boolean(externalAudioId);
        const externalConversationMessages = Array.isArray(queriedAudioPost?.conversationMessages)
          && queriedAudioPost.conversationMessages.length > 0
          ? queriedAudioPost.conversationMessages
          : conversationHistory;
        const generated = shouldDownloadExternalAudio
          ? {
              topic,
              script: topic,
              lines: [topic],
              audioBlobs: [await downloadExternalAudioBlob(externalAudioId, rate => {
                progress.update(rate);
              })],
              messages: externalConversationMessages,
              postAudioPromise: Promise.resolve(),
            }
          : await (async () => {
            const [promptText, activeVoicePromptAudio] = await Promise.all([
              getActivePromptText(),
              getActiveVoicePromptAudio(),
            ]);

            startLoadingMeteorShower(loadingMeteorState, canvas.width, canvas.height);
            try {
              return await generateAudioSequence(
                topic,
                promptText,
                activeVoicePromptAudio.blob,
                activeVoicePromptAudio.fileName,
                rate => {
                  progress.update(rate);
                },
                conversationHistory,
              );
            } finally {
              stopLoadingMeteorShower(loadingMeteorState);
            }
          })();

        if (LOADING_DEBUG_HOLD_MS > 0) {
          await wait(LOADING_DEBUG_HOLD_MS);
        }

        clearCurrentAudio({ keepPlaybackPrime: autoplay });
        generatedAudioBlobs = generated.audioBlobs;
        currentAudioBlobIndex = -1;
        lastGeneratedTopic = topic;
        lastGeneratedAudioId = selection.source === "api" ? (selection.audioId ?? null) : null;
        lastGeneratedConversationMessages = generated.messages ?? [];
        await Promise.all([
          backgroundImagePromise,
          generated.postAudioPromise ?? Promise.resolve(),
        ]);
        progress.finish();
        didLoadSucceed = true;
      } catch (error) {
        progress.fail();
        clearCurrentAudio();
        setPlaybackState(false);
        playbackState.shouldStartPlaybackAfterRelease = false;
        shake(playbackButton);
        throw error;
      } finally {
        playbackState.ignorePauseEvent = false;
        releaseStartedAt = performance.now();
        copyArrayValues(visualizerScales, releaseFromScales);
        playbackState.isLoadingAudio = false;
        playbackState.shouldStartPlaybackAfterRelease = didLoadSucceed && autoplay && generatedAudioBlobs.length > 0;
        updateTextRandomizerButton();
        audioLoadPromise = null;
      }
    })();

    await audioLoadPromise;
  }

  async function togglePlayback() {
    ensureAudioGraph();

    if (playbackState.isPlaying) {
      audio.pause();
      setPlaybackState(false);
      return;
    }

    if (!audio.currentSrc || currentAudioBlobIndex < 0 || playbackState.isLoadingAudio) {
      setPlaybackState(true);
      try {
        primeAudioPlaybackForAutoplay();
        await loadNextAudio({ autoplay: true });
      } catch (error) {
        setPlaybackState(false);
        throw error;
      }
      return;
    }

    if (audio.ended) {
      audio.currentTime = 0;
    }

    if (audioContext?.state === "suspended") {
      await audioContext.resume();
    }

    const didPlay = await playCurrentAudioWithAbortRetry();
    if (!didPlay) {
      setPlaybackState(false);
      return;
    }

    setPlaybackState(true);
  }

  audio.addEventListener("error", () => {
    if (isPrimingAudioPlayback) {
      return;
    }

    setPlaybackState(false);
    shake(playbackButton);
  });

  audio.addEventListener("ended", () => {
    const nextIndex = currentAudioBlobIndex + 1;
    const shouldReplayCurrentAudio = currentTextSelection?.source === "api"
      && typeof currentTextSelection?.audioId === "string"
      && (!currentTextSelection?.text || currentTextSelection.text.length === 0);

    if (nextIndex < generatedAudioBlobs.length) {
      void playGeneratedAudioAt(nextIndex).catch(error => {
        setPlaybackState(false);
        console.error(error);
      });
      return;
    }

    setPlaybackState(false);
    currentAudioBlobIndex = shouldReplayCurrentAudio ? 0 : -1;
  });

  audio.addEventListener("pause", () => {
    if (playbackState.ignorePauseEvent) {
      return;
    }

    if (!audio.ended) {
      setPlaybackState(false);
    }
  });

  updatePlaybackIndicator();
  updateTextRandomizerButton();
  void resetGenerationSettingsToDefault().catch(error => {
    console.error(error);
  });
  void prepareBackgroundText();

  function render(timestamp) {
    const { width, height } = canvas;
    const isAudioPlaying = !audio.paused && !audio.ended;
    const deltaTime = Number.isFinite(canvas.__lastRenderTimestamp)
      ? Math.max(0, (timestamp - canvas.__lastRenderTimestamp) / 1000)
      : 0;

    canvas.__lastRenderTimestamp = timestamp;

    const isReleasingScale = !playbackState.isLoadingAudio
      && releaseFromScales.some(scale => Math.abs(scale - 1) > VISUALIZER_REST_THRESHOLD)
      && (timestamp - releaseStartedAt) < LOADING_EXPAND_DURATION_MS;

    if (playbackState.isLoadingAudio) {
      writeLoadingScales(visualizerScales, timestamp, loadingStartedAt);
    } else if (isReleasingScale) {
      writeReleaseScales(visualizerScales, timestamp, releaseStartedAt, releaseFromScales);
    } else {
      visualizerScales.fill(1);
    }

    drawBackground(context, width, height);

    if (analyser && frequencyData && isAudioPlaying) {
      analyser.getFloatFrequencyData(frequencyData);

      let sum = 0;
      let sampleCount = 0;

      for (const value of frequencyData) {
        if (!Number.isFinite(value)) {
          continue;
        }

        sum += decibelsToLevel(value);
        sampleCount += 1;
      }

      const normalizedEnergy = sampleCount ? sum / sampleCount : 0;
      const energySmoothing = normalizedEnergy > energy ? VISUALIZER_ATTACK_SMOOTHING : VISUALIZER_DECAY_SMOOTHING;
      energy = smoothTowards(energy, normalizedEnergy, energySmoothing, deltaTime);

      for (let index = 0; index < VISUALIZER_BAR_COUNT; index += 1) {
        const descriptor = barDescriptors[index];
        let bucketTotal = 0;
        let bucketSquareTotal = 0;
        let bucketCount = 0;

        if (descriptor) {
          for (let i = descriptor.startBin; i <= descriptor.endBin; i += 1) {
            const level = decibelsToLevel(frequencyData[i] ?? MIN_DECIBELS);
            bucketTotal += level;
            bucketSquareTotal += level * level;
            bucketCount += 1;
          }
        }

        const bucketAverage = bucketCount ? bucketTotal / bucketCount : 0;
        const bucketRms = bucketCount ? Math.sqrt(bucketSquareTotal / bucketCount) : 0;
        const bucketLevel = bucketAverage * 0.55 + bucketRms * 0.45;
        const centerBias = centerWeightedValue(index, VISUALIZER_BAR_COUNT) * 0.006;
        const nextLevel = clamp(bucketLevel * VISUALIZER_LEVEL_GAIN + centerBias, 0, VISUALIZER_LEVEL_HEADROOM);
        const levelSmoothing = nextLevel > smoothedLevels[index] ? VISUALIZER_ATTACK_SMOOTHING : VISUALIZER_DECAY_SMOOTHING;
        smoothedLevels[index] = smoothTowards(smoothedLevels[index], nextLevel, levelSmoothing, deltaTime);
        const displaySpeed = smoothedLevels[index] > displayedLevels[index]
          ? VISUALIZER_DISPLAY_RISE_SPEED
          : VISUALIZER_DISPLAY_FALL_SPEED;
        displayedLevels[index] = clamp(
          lerp(displayedLevels[index], smoothedLevels[index], deltaTime * displaySpeed),
          0,
          VISUALIZER_LEVEL_HEADROOM,
        );
      }
    } else {
      energy = smoothTowards(energy, 0, VISUALIZER_DECAY_SMOOTHING, deltaTime);
      for (let index = 0; index < smoothedLevels.length; index += 1) {
        smoothedLevels[index] = smoothTowards(smoothedLevels[index], 0, VISUALIZER_DECAY_SMOOTHING, deltaTime);
      }
      for (let index = 0; index < displayedLevels.length; index += 1) {
        displayedLevels[index] = clamp(
          lerp(displayedLevels[index], 0, deltaTime * VISUALIZER_DISPLAY_FALL_SPEED),
          0,
          VISUALIZER_LEVEL_HEADROOM,
        );
      }
    }

    if (!playbackState.isLoadingAudio && !isReleasingScale && releaseFromScales.some(scale => scale !== 1)) {
      releaseFromScales.fill(1);
    }

    if (playbackState.shouldStartPlaybackAfterRelease && !playbackState.isLoadingAudio && !isReleasingScale && isVisualizerAtBaseline()) {
      playbackState.shouldStartPlaybackAfterRelease = false;
      Promise.resolve().then(async () => {
        await playGeneratedAudioAt(0);
      }).catch(error => {
        setPlaybackState(false);
        console.error(error);
      });
    }

    const shouldAnimate = playbackState.isLoadingAudio
      || isAudioPlaying
      || energy > VISUALIZER_REST_THRESHOLD
      || displayedLevels.some(level => level > VISUALIZER_REST_THRESHOLD)
      || visualizerScales.some(scale => Math.abs(scale - 1) > VISUALIZER_REST_THRESHOLD)
      || hasActiveLoadingMeteors(loadingMeteorState);

    const backgroundImageCanvas = backgroundImageOpacity > 0.001 && BACKGROUND_IMAGE_OPACITY > 0
      ? backgroundRenderBuffer.canvas
      : null;
    if (backgroundImageCanvas) {
      drawBackgroundImageBuffer(backgroundRenderBuffer, backgroundImage, width, height);
    }

    drawVisualizer(
      renderBuffer.ctx,
      width,
      height,
      energy,
      displayedLevels,
      visualizerScales,
      shouldAnimate,
      backgroundTextState,
      deltaTime,
      backgroundImageCanvas,
      backgroundImageOpacity,
      CONTROL_BUTTON_SIZE,
      loadingMeteorState,
    );
    context.drawImage(renderBuffer.canvas, 0, 0, width, height);
    updateTextRandomizerButtonState();

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);

  window.addEventListener("beforeunload", () => {
    clearCurrentAudio();
  });
});

window.addEventListener("resize", () => {
  const frame = document.body.querySelector("body > .wrap > .frame");
  const canvas = frame?.querySelector(":scope > canvas");

  if (!frame || !canvas) {
    return;
  }

  syncFrameCanvasSize(frame, canvas);
});
    </script>
  </body>
