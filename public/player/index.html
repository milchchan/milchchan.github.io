    <script type="module">
      const ENABLE_PEAK_HOLD = true
      const ENABLE_LOOP = true
      const FREQUENCY_SCALE = 'log'
      const DEFAULT_GAIN = 1
      const MIN_DISPLAY_FREQUENCY = 20
      const MAX_DISPLAY_FREQUENCY = 20000
      const BAR_FREQUENCY_RANGE = 500
      const MIN_DECIBELS = -100
      const MAX_DECIBELS = -20
      const PEAK_DROP_PER_FRAME = 3.6
      const PEAK_HEADROOM = 10
      const VISUALIZER_BOTTOM_PADDING = 0
      const MIN_LOG_FREQUENCY = 20
      const BAR_GRADIENT_STOPS = [
        { offset: 0.5, color: 'rgb(255 198 224 / 0.75)' },
        { offset: 0.75, color: 'rgb(134 238 254 / 0.75)' },
      ]
      const PEAK_HOLD_COLOR = 'rgb(255 255 255 / 0.75)'
      const PEAK_HOLD_ALPHA = 0.95
      const PEAK_HOLD_HEIGHT = 2
      const BAR_ALPHA = 1.0
      const BAR_GAP = 0
      const BACKGROUND_REVEAL_DURATION = 1
      const BACKGROUND_REVEAL_START_SCALE = 1.1
      const BACKGROUND_REVEAL_END_SCALE = 1
      const SPECTRAL_FLUX_MIN_FREQUENCY = 40
      const SPECTRAL_FLUX_MAX_FREQUENCY = 4000
      const SPECTRAL_FLUX_THRESHOLD = 0.07
      const SPECTRAL_FLUX_COOLDOWN_MS = 250
      const AUDIO_URL = '/audio/Starlight.mp3'
      const FOREGROUND_ANIMATION = [
        {delay: 0.1, url: "/images/Background-Milch-Zankuro-1.png"},
        {delay: 0.1, url: "/images/Background-Milch-Zankuro-2.png"},
        {delay: 0.1, url: "/images/Background-Milch-Zankuro-3.png"},
        {delay: 0.1, url: "/images/Background-Milch-Zankuro-2.png"},
        {delay: 0.1, url: "/images/Background-Milch-Zankuro-1.png"}
      ]
      const BACKGROUND_ANIMATION = [
        {delay: 0.1, url: "/images/Background-Merku-Zankuro-1.png"},
        {delay: 0.1, url: "/images/Background-Merku-Zankuro-2.png"},
        {delay: 0.1, url: "/images/Background-Merku-Zankuro-3.png"},
        {delay: 0.1, url: "/images/Background-Merku-Zankuro-2.png"},
        {delay: 0.1, url: "/images/Background-Merku-Zankuro-1.png"}
      ]
      class Animation {
        constructor(repeats = 1, frames = []) {
          this.repeats = repeats
          this.time = 0
          this.frames = frames
        }

        get cycleDuration() {
          let duration = 0

          for (const frame of this.frames) {
            duration += frame.delay
          }

          return duration
        }

        get duration() {
          const duration = this.cycleDuration

          if (this.repeats > 1) {
            return duration * this.repeats
          }

          return duration
        }

        get isPlaying() {
          return this.frames.length > 0 && this.time < this.duration
        }

        reset() {
          this.time = 0
        }

        advance(deltaSeconds) {
          this.time = Math.max(0, this.time + deltaSeconds)
        }

        get current() {
          if (this.frames.length === 0) {
            return null
          }

          let time = this.time
          let frame = this.frames[0]
          const duration = this.cycleDuration

          if (duration <= 0) {
            return frame
          }

          if (this.repeats !== 1) {
            if (this.repeats > 1 && time > duration * this.repeats) {
              time = duration
            } else {
              time %= duration
            }
          }

          if (time >= frame.delay) {
            let delay = frame.delay

            for (let i = 1; i < this.frames.length; i++) {
              frame = this.frames[i]
              delay += frame.delay

              if (time < delay) {
                break
              }
            }
          }

          return frame
        }
      }

      window.addEventListener("load", async event => {

        document.body.innerHTML = `
          <div class="progress"><div class="bar animating"></div></div>
          <div class="wrap">
            <div class="frame shell">
              <canvas class="visualizer" aria-hidden="true"></canvas>
              <div class="playback-indicator is-loading" aria-hidden="true">
                <i class="fa-solid fa-play icon-play"></i>
                <i class="fa-solid fa-pause icon-pause"></i>
              </div>
              <div class="tooltip"></div>
              <audio class="player" preload="auto" crossorigin="anonymous"></audio>
            </div>
          </div>
        `

        const shell = document.body.querySelector('.shell')
        const canvas = document.body.querySelector('.visualizer')
        const progress = document.body.querySelector('.progress')
        const progressBar = document.body.querySelector('.bar')
        const playbackIndicator = document.body.querySelector('.playback-indicator')
        const tooltip = document.body.querySelector('.tooltip')
        const audio = document.body.querySelector('.player')

        try {
            const response = await fetch(window.devicePixelRatio > 1 ? `/images/Stripes@${Math.trunc(window.devicePixelRatio)}x.png` : "/images/Stripes.png");

            if (response.ok) {
                const dataURL = await new Promise(async (resolve, reject) => {
                    const reader = new FileReader();

                    reader.onload = () => {
                        resolve(reader.result);
                    };
                    reader.onerror = () => {
                        reject(reader.error);
                    };
                    reader.readAsDataURL(await response.blob());
                });

                if (dataURL !== null) {
                    progressBar.style.backgroundImage = `url('${dataURL}')`;
                }
            }
        } catch (error) {
            console.error(error);
        }

        const ctx = canvas.getContext('2d')
        const audioContext = new AudioContext()
        const analyser = audioContext.createAnalyser()
        const gainNode = audioContext.createGain()
        const source = audioContext.createMediaElementSource(audio)

        source.connect(gainNode)
        gainNode.connect(analyser)
        analyser.connect(audioContext.destination)

        analyser.fftSize = 2048
        analyser.smoothingTimeConstant = 0.82
        analyser.minDecibels = MIN_DECIBELS
        analyser.maxDecibels = MAX_DECIBELS
        gainNode.gain.value = DEFAULT_GAIN
        audio.loop = ENABLE_LOOP

        const frequencyData = new Float32Array(analyser.frequencyBinCount)
        const previousFrequencyData = new Float32Array(analyser.frequencyBinCount)
        const renderBuffers = {
          background: createRenderBuffer(),
          foreground: createRenderBuffer(),
          backBuffer: createRenderBuffer(),
        }
        let peakHeights = []
        let barDescriptors = []
        let hoverIndex = -1
        let audioObjectUrl = null
        let audioLoadPromise = null
        let initialAssetLoadPromise = null
        let lastSpectralFluxAboveThreshold = false
        let lastTriggerTimestamp = -Infinity
        let lastDrawTimestamp = 0
        let activeForegroundAnimation = null
        let activeBackgroundAnimation = null
        let idleForegroundImage = null
        let idleBackgroundImage = null
        let foregroundRevealElapsed = BACKGROUND_REVEAL_DURATION
        let backgroundRevealElapsed = BACKGROUND_REVEAL_DURATION
        let foregroundAnimation = null
        let backgroundAnimation = null

        let animationFrame = 0

        function resolveAssetUrl(url) {
          return /^(?:data:|blob:|https?:)/.test(url) || url.startsWith('/')
            ? url
            : `/${url}`
        }

        async function blobToDataUrl(blob) {
          return await new Promise((resolve, reject) => {
            const reader = new FileReader()

            reader.onload = () => {
              resolve(reader.result)
            }

            reader.onerror = () => {
              reject(reader.error)
            }

            reader.readAsDataURL(blob)
          })
        }

        async function loadAnimationImage(url) {
          return await new Promise((resolve, reject) => {
            const image = new Image()

            image.onload = () => {
              resolve(image)
            }

            image.onerror = () => {
              reject(new Error(`Failed to load animation image: ${url}`))
            }

            image.src = resolveAssetUrl(url)
          })
        }

        async function loadAnimationFrame(frame) {
          const response = await fetch(resolveAssetUrl(frame.url))

          if (!response.ok) {
            throw new Error(`Failed to fetch animation frame: ${frame.url}`)
          }

          const dataUrl = await blobToDataUrl(await response.blob())

          return {
            delay: frame.delay,
            url: dataUrl,
            image: await loadAnimationImage(dataUrl),
          }
        }

        async function createAnimation(frames, repeats = 1) {
          const loadedFrames = await Promise.all(frames.map((frame) => loadAnimationFrame(frame)))

          return new Animation(repeats, loadedFrames)
        }

        function syncIdleImages(shouldReveal = false) {
          idleForegroundImage = foregroundAnimation?.frames?.[0]?.image ?? null
          idleBackgroundImage = backgroundAnimation?.frames?.[0]?.image ?? null
          foregroundRevealElapsed = shouldReveal ? 0 : BACKGROUND_REVEAL_DURATION
          backgroundRevealElapsed = shouldReveal ? 0 : BACKGROUND_REVEAL_DURATION
        }

        function startBackgroundAnimation() {
          const foregroundSourceAnimation = foregroundAnimation
          const backgroundSourceAnimation = backgroundAnimation

          if (!foregroundSourceAnimation || !backgroundSourceAnimation) {
            return
          }

          if (activeForegroundAnimation?.isPlaying || activeBackgroundAnimation?.isPlaying) {
            return
          }

          activeForegroundAnimation = new Animation(foregroundSourceAnimation.repeats, foregroundSourceAnimation.frames)
          activeBackgroundAnimation = new Animation(backgroundSourceAnimation.repeats, backgroundSourceAnimation.frames)
          activeForegroundAnimation.reset()
          activeBackgroundAnimation.reset()
        }

        function getSpectralFlux() {
          const nyquist = audioContext.sampleRate / 2
          const maxBinIndex = frequencyData.length - 1
          const minFrequency = Math.max(0, SPECTRAL_FLUX_MIN_FREQUENCY)
          const maxFrequency = Math.min(nyquist, SPECTRAL_FLUX_MAX_FREQUENCY)

          if (maxFrequency <= minFrequency || maxBinIndex <= 0) {
            return 0
          }

          const startBin = Math.max(0, Math.floor((minFrequency / nyquist) * frequencyData.length))
          const endBin = Math.min(maxBinIndex, Math.ceil((maxFrequency / nyquist) * frequencyData.length))
          let flux = 0
          let count = 0

          for (let bin = startBin; bin <= endBin; bin += 1) {
            const current = Number.isFinite(frequencyData[bin]) ? frequencyData[bin] : analyser.minDecibels
            const previous = Number.isFinite(previousFrequencyData[bin]) ? previousFrequencyData[bin] : analyser.minDecibels
            const currentMagnitude = Math.max(0, (current - analyser.minDecibels) / (analyser.maxDecibels - analyser.minDecibels))
            const previousMagnitude = Math.max(0, (previous - analyser.minDecibels) / (analyser.maxDecibels - analyser.minDecibels))

            flux += Math.max(0, currentMagnitude - previousMagnitude)
            count += 1
          }

          return count > 0 ? flux / count : 0
        }

        function syncBackgroundAnimationTrigger(spectralFlux, timestamp) {
          if (audio.paused || audio.ended) {
            lastSpectralFluxAboveThreshold = false
            return
          }

          const isAboveThreshold = spectralFlux >= SPECTRAL_FLUX_THRESHOLD
          const isCooldownComplete = (timestamp - lastTriggerTimestamp) >= SPECTRAL_FLUX_COOLDOWN_MS

          if (isAboveThreshold && !lastSpectralFluxAboveThreshold && isCooldownComplete) {
            startBackgroundAnimation()
            lastTriggerTimestamp = timestamp
          }

          lastSpectralFluxAboveThreshold = isAboveThreshold
        }

        function createRenderBuffer() {
          const canvasElement = typeof OffscreenCanvas === 'function'
            ? new OffscreenCanvas(1, 1)
            : document.createElement('canvas')
          const context = canvasElement.getContext('2d')

          context.imageSmoothingEnabled = true
          context.imageSmoothingQuality = 'high'

          return {
            canvas: canvasElement,
            ctx: context,
          }
        }

        function resizeRenderBuffer(buffer, width, height) {
          buffer.canvas.width = Math.max(1, Math.floor(width))
          buffer.canvas.height = Math.max(1, Math.floor(height))
          buffer.ctx.imageSmoothingEnabled = true
          buffer.ctx.imageSmoothingQuality = 'high'
        }

        function clearRenderBuffer(buffer, width, height) {
          buffer.ctx.setTransform(1, 0, 0, 1, 0, 0)
          buffer.ctx.clearRect(0, 0, width, height)
          buffer.ctx.globalCompositeOperation = 'source-over'
          buffer.ctx.globalAlpha = 1
        }

        function getBarScreenBounds(descriptor) {
          const horizontalInset = BAR_GAP * 0.5
          const left = Math.floor(descriptor.x + horizontalInset)
          const right = Math.ceil(descriptor.x + descriptor.width - horizontalInset)

          return {
            left,
            right,
            width: Math.max(1, right - left),
          }
        }

        function drawCoverImage(targetCtx, image, width, height, opacity = 1, scale = 1) {
          if (!image || image.width === 0 || image.height === 0) {
            return
          }

          const canvasAspect = width / height
          const imageAspect = image.width / image.height
          let drawWidth = width
          let drawHeight = height
          let offsetX = 0
          let offsetY = 0

          if (imageAspect > canvasAspect) {
            drawHeight = height
            drawWidth = drawHeight * imageAspect
            offsetX = (width - drawWidth) * 0.5
          } else {
            drawWidth = width
            drawHeight = drawWidth / imageAspect
            offsetY = 0
          }

          targetCtx.save()
          targetCtx.translate(width * 0.5, height * 0.5)
          targetCtx.scale(scale, scale)
          targetCtx.globalAlpha = opacity
          targetCtx.drawImage(
            image,
            offsetX - width * 0.5,
            offsetY - height * 0.5,
            drawWidth,
            drawHeight,
          )
          targetCtx.restore()
        }

        function drawForeground(width, height, deltaSeconds) {
          const currentFrame = activeForegroundAnimation?.current ?? (idleForegroundImage ? { image: idleForegroundImage } : null)
          const foregroundBuffer = renderBuffers.foreground

          if (!activeForegroundAnimation && foregroundRevealElapsed < BACKGROUND_REVEAL_DURATION) {
            foregroundRevealElapsed = Math.min(
              BACKGROUND_REVEAL_DURATION,
              foregroundRevealElapsed + deltaSeconds,
            )
          }

          if (currentFrame?.image) {
            const revealProgress = BACKGROUND_REVEAL_DURATION === 0
              ? 1
              : Math.min(1, foregroundRevealElapsed / BACKGROUND_REVEAL_DURATION)
            const easedRevealProgress = 1 - ((1 - revealProgress) ** 3)
            const opacity = easedRevealProgress
            const scale = BACKGROUND_REVEAL_START_SCALE
              + (BACKGROUND_REVEAL_END_SCALE - BACKGROUND_REVEAL_START_SCALE) * easedRevealProgress

            drawCoverImage(
              foregroundBuffer.ctx,
              currentFrame.image,
              width,
              height,
              activeForegroundAnimation ? 1 : opacity,
              activeForegroundAnimation ? 1 : scale,
            )
          }

          if (activeForegroundAnimation) {
            activeForegroundAnimation.advance(deltaSeconds)

            if (!activeForegroundAnimation.isPlaying) {
              activeForegroundAnimation = null
            }
          }
        }

        function updateBackgroundAnimation(deltaSeconds) {
          if (activeBackgroundAnimation) {
            activeBackgroundAnimation.advance(deltaSeconds)

            if (!activeBackgroundAnimation.isPlaying) {
              activeBackgroundAnimation = null
            }
          }
        }

        function drawAnalyzerMask(targetCtx, baseLine, maxBarHeight) {
          const originalSmoothingEnabled = targetCtx.imageSmoothingEnabled
          const originalSmoothingQuality = targetCtx.imageSmoothingQuality

          targetCtx.imageSmoothingEnabled = false
          targetCtx.fillStyle = '#ffffff'
          targetCtx.globalAlpha = 1

          for (let i = 0; i < barDescriptors.length; i += 1) {
            const descriptor = barDescriptors[i]
            const decibels = getBarLevel(descriptor.startBin, descriptor.endBin)
            const barHeight = dbToHeight(decibels, maxBarHeight)
            const bounds = getBarScreenBounds(descriptor)
            const y = Math.floor(baseLine - barHeight)
            const snappedBarHeight = Math.max(1, Math.floor(barHeight))

            descriptor.top = y
            descriptor.bottom = baseLine
            targetCtx.fillRect(bounds.left, y, bounds.width, snappedBarHeight)

            if (ENABLE_PEAK_HOLD) {
              peakHeights[i] = Math.max(barHeight, peakHeights[i] - PEAK_DROP_PER_FRAME)

              const peakY = Math.floor(Math.max(PEAK_HOLD_HEIGHT, baseLine - peakHeights[i]) - PEAK_HEADROOM * 0.5)
              targetCtx.fillRect(bounds.left, peakY, bounds.width, PEAK_HOLD_HEIGHT)
            }
          }

          targetCtx.imageSmoothingEnabled = originalSmoothingEnabled
          targetCtx.imageSmoothingQuality = originalSmoothingQuality
        }

        function drawBackground(width, height, baseLine, maxBarHeight, deltaSeconds) {
          const currentFrame = activeBackgroundAnimation?.current ?? (idleBackgroundImage ? { image: idleBackgroundImage } : null)

          if (!activeBackgroundAnimation && backgroundRevealElapsed < BACKGROUND_REVEAL_DURATION) {
            backgroundRevealElapsed = Math.min(
              BACKGROUND_REVEAL_DURATION,
              backgroundRevealElapsed + deltaSeconds,
            )
          }

          if (!currentFrame?.image) {
            return
          }

          const revealProgress = BACKGROUND_REVEAL_DURATION === 0
            ? 1
            : Math.min(1, backgroundRevealElapsed / BACKGROUND_REVEAL_DURATION)
          const easedRevealProgress = 1 - ((1 - revealProgress) ** 3)
          const opacity = activeBackgroundAnimation ? 1 : easedRevealProgress
          const scale = activeBackgroundAnimation
            ? 1
            : BACKGROUND_REVEAL_START_SCALE + (BACKGROUND_REVEAL_END_SCALE - BACKGROUND_REVEAL_START_SCALE) * easedRevealProgress

          drawAnalyzerMask(renderBuffers.background.ctx, baseLine, maxBarHeight)
          renderBuffers.background.ctx.globalCompositeOperation = 'source-atop'
          drawCoverImage(renderBuffers.background.ctx, currentFrame.image, width, height, opacity, scale)
          renderBuffers.background.ctx.globalCompositeOperation = 'source-over'
        }

        function composeFrame(width, height) {
          renderBuffers.backBuffer.ctx.drawImage(renderBuffers.foreground.canvas, 0, 0, width, height)
          renderBuffers.backBuffer.ctx.drawImage(renderBuffers.background.canvas, 0, 0, width, height)
          ctx.clearRect(0, 0, width, height)
          ctx.drawImage(renderBuffers.backBuffer.canvas, 0, 0, width, height)
        }

        function resizeCanvas() {
          const dpr = window.devicePixelRatio || 1
          const width = window.innerWidth
          const height = window.innerHeight

          canvas.width = Math.floor(width * dpr)
          canvas.height = Math.floor(height * dpr)
          canvas.style.width = `${width}px`
          canvas.style.height = `${height}px`
          for (const buffer of Object.values(renderBuffers)) {
            resizeRenderBuffer(buffer, width, height)
          }

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
          ctx.imageSmoothingEnabled = true
          ctx.imageSmoothingQuality = 'high'
        }

        function createBarGradient(height) {
          const gradient = ctx.createLinearGradient(0, height, 0, 0)

          for (const stop of BAR_GRADIENT_STOPS) {
            gradient.addColorStop(stop.offset, stop.color)
          }

          return gradient
        }

        function formatFrequency(frequency) {
          if (frequency >= 1000) {
            return `${(frequency / 1000).toFixed(2)} kHz`
          }

          return `${Math.round(frequency)} Hz`
        }

        function getRequestedBarCount(width, minDisplayFrequency, maxDisplayFrequency) {
          const displayFrequencyRange = Math.max(1, maxDisplayFrequency - minDisplayFrequency)
          const frequencyDrivenBarCount = Math.max(1, Math.ceil(displayFrequencyRange / BAR_FREQUENCY_RANGE))
          const widthLimitedBarCount = Math.max(1, Math.floor(width / 10))

          return Math.min(widthLimitedBarCount, frequencyDrivenBarCount)
        }

        function buildBarDescriptors(width) {
          const binCount = frequencyData.length
          const nyquist = audioContext.sampleRate / 2
          const maxBin = binCount - 1
          const minDisplayFrequency = Math.max(0, Math.min(MIN_DISPLAY_FREQUENCY, nyquist))
          const maxDisplayFrequency = Math.min(MAX_DISPLAY_FREQUENCY, nyquist)
          const safeMaxDisplayFrequency = Math.max(minDisplayFrequency, maxDisplayFrequency)
          const requestedBarCount = getRequestedBarCount(width, minDisplayFrequency, safeMaxDisplayFrequency)
          const minDisplayBin = Math.max(0, Math.min(maxBin, Math.floor((minDisplayFrequency / nyquist) * binCount)))
          const maxDisplayBin = Math.max(
            minDisplayBin,
            Math.min(maxBin, Math.ceil((safeMaxDisplayFrequency / nyquist) * binCount) - 1),
          )
          const activeBinCount = maxDisplayBin - minDisplayBin + 1

          if (FREQUENCY_SCALE === 'linear') {
            const barCount = Math.max(1, Math.min(requestedBarCount, activeBinCount))
            const barWidth = width / barCount

            return Array.from({ length: barCount }, (_, index) => {
              const startBin = minDisplayBin + Math.floor((index / barCount) * activeBinCount)
              const endBin = Math.min(maxDisplayBin, minDisplayBin + Math.floor(((index + 1) / barCount) * activeBinCount) - 1)
              const safeEndBin = Math.max(startBin, endBin)
              const startFrequency = (startBin / maxBin) * nyquist
              const endFrequency = ((safeEndBin + 1) / binCount) * nyquist

              return {
                x: index * barWidth,
                width: barWidth,
                startBin,
                endBin: safeEndBin,
                startFrequency,
                endFrequency,
                centerFrequency: (startFrequency + endFrequency) * 0.5,
                top: 0,
                bottom: 0,
              }
            })
          }

          const minFrequency = Math.max(audioContext.sampleRate / analyser.fftSize, MIN_LOG_FREQUENCY, minDisplayFrequency)
          const minLog = Math.log10(minFrequency)
          const maxLog = Math.log10(Math.max(minFrequency, safeMaxDisplayFrequency))
          const barCount = Math.max(1, Math.min(requestedBarCount, activeBinCount))
          const barWidth = width / barCount
          const binEdges = new Array(barCount + 1)

          binEdges[0] = minDisplayBin
          binEdges[barCount] = maxDisplayBin + 1

          for (let index = 1; index < barCount; index += 1) {
            const ratio = index / barCount
            const frequency = 10 ** (minLog + (maxLog - minLog) * ratio)
            const proposedEdge = Math.floor((frequency / nyquist) * binCount)
            const minAllowedEdge = binEdges[index - 1] + 1
            const remainingEdges = barCount - index
            const maxAllowedEdge = (maxDisplayBin + 1) - remainingEdges

            binEdges[index] = Math.max(minAllowedEdge, Math.min(maxAllowedEdge, proposedEdge))
          }

          return Array.from({ length: barCount }, (_, index) => {
            const startBin = binEdges[index]
            const safeEndBin = Math.max(startBin, binEdges[index + 1] - 1)
            const safeStartFrequency = (startBin / maxBin) * nyquist
            const safeEndFrequency = ((safeEndBin + 1) / binCount) * nyquist

            return {
              x: index * barWidth,
              width: barWidth,
              startBin,
              endBin: safeEndBin,
              startFrequency: safeStartFrequency,
              endFrequency: safeEndFrequency,
              centerFrequency: Math.sqrt(Math.max(safeStartFrequency, 1) * safeEndFrequency),
              top: 0,
              bottom: 0,
            }
          })
        }

        function getBarLevel(startBin, endBin) {
          let value = analyser.minDecibels

          for (let bin = startBin; bin <= endBin; bin += 1) {
            value = Math.max(value, Number.isFinite(frequencyData[bin]) ? frequencyData[bin] : analyser.minDecibels)
          }

          return value
        }

        function dbToHeight(decibels, maxBarHeight) {
          const normalized = (decibels - analyser.minDecibels) / (analyser.maxDecibels - analyser.minDecibels)
          return Math.max(0, Math.min(1, normalized)) * maxBarHeight
        }

        function updateTooltip(pointerX, pointerY) {
          if (hoverIndex < 0 || !barDescriptors[hoverIndex]) {
            tooltip.classList.remove('visible')
            return
          }

          const { startFrequency, endFrequency, centerFrequency } = barDescriptors[hoverIndex]
          tooltip.textContent = `${formatFrequency(startFrequency)} - ${formatFrequency(endFrequency)} / ${formatFrequency(centerFrequency)}`
          tooltip.style.left = `${Math.min(pointerX + 16, window.innerWidth - tooltip.offsetWidth - 12)}px`
          tooltip.style.top = `${Math.max(12, pointerY - 36)}px`
          tooltip.classList.add('visible')
        }

        function showProgress() {
          progress.classList.add('visible')
        }

        function updateProgress(rate) {
          const clampedRate = Math.max(0, Math.min(1, rate))

          progress.classList.remove('indeterminate')
          progressBar.style.width = `${clampedRate * 100}%`
        }

        function setIndeterminateProgress() {
          progress.classList.add('indeterminate')
          progressBar.style.width = '100%'
        }

        function hideProgress() {
          progress.classList.remove('visible')
        }

        function updatePlaybackIcon() {
          const isPlaying = !audio.paused && !audio.ended

          playbackIndicator.classList.toggle('is-playing', isPlaying)
        }

        function setPlaybackIndicatorLoading(isLoading) {
          playbackIndicator.classList.toggle('is-loading', isLoading)
        }

        async function loadAudioWithProgress() {
          if (audioLoadPromise !== null) {
            return audioLoadPromise
          }

          setPlaybackIndicatorLoading(true)
          showProgress()
          updateProgress(0)

          audioLoadPromise = (async () => {
            try {
              const response = await fetch(AUDIO_URL)

              if (!response.ok || response.body === null) {
                throw new Error(`Failed to load audio: ${response.status} ${response.statusText}`)
              }

              const reader = response.body.getReader()
              const contentLength = Number(response.headers.get('Content-Length'))
              const chunks = []
              let receivedLength = 0

              if (!Number.isFinite(contentLength) || contentLength <= 0) {
                setIndeterminateProgress()
              }

              while (true) {
                const { done, value } = await reader.read()

                if (done) {
                  break
                }

                chunks.push(value)
                receivedLength += value.length

                if (Number.isFinite(contentLength) && contentLength > 0) {
                  updateProgress(receivedLength / contentLength)
                }
              }

              const blob = new Blob(chunks, { type: response.headers.get('Content-Type') || 'audio/mpeg' })

              if (audioObjectUrl !== null) {
                URL.revokeObjectURL(audioObjectUrl)
              }

              audioObjectUrl = URL.createObjectURL(blob)
              audio.src = audioObjectUrl
              audio.load()

              updateProgress(1)
            } catch (error) {
              audioLoadPromise = null
              hideProgress()
              setPlaybackIndicatorLoading(false)
              throw error
            }
          })()

          return audioLoadPromise
        }

        async function loadInitialAssets() {
          if (initialAssetLoadPromise !== null) {
            return initialAssetLoadPromise
          }

          initialAssetLoadPromise = (async () => {
            try {
              await loadAudioWithProgress()

              foregroundAnimation = await createAnimation(FOREGROUND_ANIMATION, 1)
              backgroundAnimation = await createAnimation(BACKGROUND_ANIMATION, 1)
              syncIdleImages(true)

              window.setTimeout(hideProgress, 250)
              window.setTimeout(() => {
                setPlaybackIndicatorLoading(false)
              }, 250)
            } catch (error) {
              initialAssetLoadPromise = null
              hideProgress()
              setPlaybackIndicatorLoading(false)
              throw error
            }
          })()

          return initialAssetLoadPromise
        }

        function drawVisualizer(timestamp = 0) {
          const width = canvas.clientWidth
          const height = canvas.clientHeight
          const deltaSeconds = lastDrawTimestamp === 0 ? 0 : (timestamp - lastDrawTimestamp) / 1000

          lastDrawTimestamp = timestamp

          analyser.getFloatFrequencyData(frequencyData)
          syncBackgroundAnimationTrigger(getSpectralFlux(), timestamp)

          const maxBarHeight = height
          const baseLine = height - VISUALIZER_BOTTOM_PADDING
          const nyquist = audioContext.sampleRate / 2
          const minDisplayFrequency = Math.max(0, Math.min(MIN_DISPLAY_FREQUENCY, nyquist))
          const maxDisplayFrequency = Math.min(MAX_DISPLAY_FREQUENCY, nyquist)
          const expectedBarCount = getRequestedBarCount(width, minDisplayFrequency, Math.max(minDisplayFrequency, maxDisplayFrequency))

          if (barDescriptors.length === 0 || barDescriptors.length !== expectedBarCount) {
            barDescriptors = buildBarDescriptors(width)
          }

          if (peakHeights.length !== barDescriptors.length) {
            peakHeights = new Array(barDescriptors.length).fill(0)
          }

          for (const buffer of Object.values(renderBuffers)) {
            clearRenderBuffer(buffer, width, height)
          }

          drawForeground(width, height, deltaSeconds)
          drawBackground(width, height, baseLine, maxBarHeight, deltaSeconds)
          composeFrame(width, height)
          updateBackgroundAnimation(deltaSeconds)
          ctx.globalAlpha = 1
          previousFrequencyData.set(frequencyData)

          animationFrame = window.requestAnimationFrame(drawVisualizer)
        }

        async function ensurePlaybackReady() {
          if (audioContext.state === 'suspended') {
            await audioContext.resume()
          }
        }

        async function togglePlayback() {
          await loadAudioWithProgress()
          await ensurePlaybackReady()

          if (!ENABLE_LOOP && audio.ended) {
            audio.currentTime = 0
          }

          if (audio.paused) {
            await audio.play()
          } else {
            audio.pause()
          }
        }

        shell.addEventListener('click', () => {
          togglePlayback().catch((error) => {
            console.error('Playback failed:', error)
          })
        })

        shell.addEventListener('pointermove', (event) => {
          const rect = canvas.getBoundingClientRect()
          const pointerX = event.clientX - rect.left
          const pointerY = event.clientY - rect.top

          hoverIndex = barDescriptors.findIndex((descriptor) => (
            pointerX >= getBarScreenBounds(descriptor).left
            && pointerX < getBarScreenBounds(descriptor).right
            && pointerY >= descriptor.top
            && pointerY <= descriptor.bottom
          ))

          updateTooltip(event.clientX, event.clientY)
        })

        shell.addEventListener('pointerleave', () => {
          hoverIndex = -1
          tooltip.classList.remove('visible')
        })

        audio.addEventListener('error', () => {
          console.error('Audio failed to load')
        })

        audio.addEventListener('play', updatePlaybackIcon)
        audio.addEventListener('pause', updatePlaybackIcon)
        audio.addEventListener('ended', updatePlaybackIcon)

        window.addEventListener('resize', () => {
          resizeCanvas()
          barDescriptors = buildBarDescriptors(canvas.clientWidth)
          peakHeights = new Array(barDescriptors.length).fill(0)
        })

        resizeCanvas()
        barDescriptors = buildBarDescriptors(canvas.clientWidth)
        updatePlaybackIcon()
        drawVisualizer()
        loadInitialAssets().catch((error) => {
          hideProgress()
          console.error('Initial asset preload failed:', error)
        })

        window.addEventListener('beforeunload', () => {
          window.cancelAnimationFrame(animationFrame)

          if (audioObjectUrl !== null) {
            URL.revokeObjectURL(audioObjectUrl)
          }
        })
      });
    </script>
  </body>
</html>
